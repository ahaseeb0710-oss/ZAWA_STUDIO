<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16x16.png">
  <link rel="manifest" href="assets/img/site.webmanifest">

  <style>
 
    /* popup */
    .cart-popup {
      position: fixed;
      top: 30px;
      right: 30px;
      background: #111;
      color: #fff;
      padding: 18px 22px;
      border-radius: 14px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 9999;
      min-width: 260px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cart-popup.show {
      transform: translateX(0);
      opacity: 1;
    }

    .cart-popup i {
      font-size: 26px;
      color: #c59d5f;
    }

    .cart-popup h4 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .cart-popup p {
      margin: 2px 0 0;
      font-size: 13px;
      color: #ccc;
    }


/* ================= GLOBAL RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
       background-color: #2b0036;
  overflow: hidden;
}


/* ================= AUTH CONTAINER ================= */
.auth-container {
  width: 100%;
  max-width: 420px;
  padding: 45px 35px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
  text-align: center;
  color: #fff;
  animation: fadeIn 0.8s ease forwards;
}


/* ================= TITLE ================= */
.auth-container h2 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 30px;
  letter-spacing: 1px;
}


/* ================= INPUTS ================= */
.auth-container input {
  width: 100%;
  padding: 14px 15px;
  margin-bottom: 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 14px;
  transition: all 0.3s ease;
}

.auth-container input::placeholder {
  color: rgba(255,255,255,0.6);
}

.auth-container input:focus {
  outline: none;
  border-color: #ff4fd8;
  background: rgba(255,255,255,0.15);
  box-shadow: 0 0 0 3px rgba(255, 79, 216, 0.2);
}


/* ================= LOGIN BUTTON ================= */
.auth-container button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #ff4fd8, #7b2ff7);
  color: #fff;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
}

.auth-container button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 25px rgba(255, 79, 216, 0.4);
}


/* ================= GOOGLE BUTTON ================= */
.google-btn {
  width: 100%;
  background: #fff;
  color: #333;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.3s ease;
  margin-bottom: 20px;
}

.google-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.google-btn img {
  width: 20px;
}


/* ================= SIGNUP LINK ================= */
.auth-container p {
  margin-top: 20px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}

.auth-container a {
  color: #ff4fd8;
  text-decoration: none;
  font-weight: 600;
}

.auth-container a:hover {
  text-decoration: underline;
}


/* ================= POPUP (IMPROVED) ================= */
.cart-popup {
  position: fixed;
  top: 30px;
  right: 30px;
  background: rgba(0,0,0,0.9);
  color: #fff;
  padding: 18px 22px;
  border-radius: 14px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  transform: translateX(120%);
  opacity: 0;
  transition: all 0.4s ease;
  z-index: 9999;
  min-width: 260px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.cart-popup.show {
  transform: translateX(0);
  opacity: 1;
}


/* ================= ANIMATION ================= */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}


/* ================= RESPONSIVE ================= */
@media (max-width: 480px) {
  .auth-container {
    margin: 20px;
    padding: 35px 25px;
  }
}


  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Login</h2>
    <button class="google-btn" onclick="googleLogin()">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
  Continue with Google
</button>
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required minlength="6">
    <button onclick="login()">Login</button>
    <p>Don't have an account? 
      <a href="signup.html" style="text-decoration: none; color: #ff4fd8;">Sign Up</a>
    </p>
  </div>

  <!-- Popup container (dynamic) -->
  <div id="popup-container"></div>

  <script>
    function showPopup(title, message, icon = "✓") {
      const popup = document.createElement("div");
      popup.className = "cart-popup show";
      popup.innerHTML = `
        <i>${icon}</i>
        <div>
          <h4>${title}</h4>
          <p>${message}</p>
        </div>
      `;
      document.body.appendChild(popup);

      // Auto hide after 3 seconds
      setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => popup.remove(), 400); // wait for transition
      }, 3000);
    }

    function login() {
  const storedUser = JSON.parse(localStorage.getItem("user"));
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // 🔴 Empty check including name
  if (!name || !email || !password) {
    showPopup("Error", "Please fill all fields!", "⚠️");
    return;
  }

  // 🔴 Check if account exists
  if (!storedUser) {
    showPopup("Error", "No account found! Please sign up first.", "⚠️");
    return;
  }

  // 🔴 Match Email & Password
  if (storedUser.email === email && storedUser.password === password) {
    localStorage.setItem("loggedIn", "true");
    showPopup("Success", "Login Successful!", "✓");

    const redirectPage = localStorage.getItem("redirectAfterLogin");
    setTimeout(() => {
      if (redirectPage) {
        localStorage.removeItem("redirectAfterLogin");
        window.location.href = redirectPage;
      } else {
        window.location.href = "index.html";
      }
    }, 1000); // give time for popup
  } else {
    showPopup("Error", "Invalid Email or Password!", "❌");
  }
}
  </script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYqOXhQK32naYdg0ZqX-T6b90yw8qDHpA",
    authDomain: "zawa-studio.firebaseapp.com",
    projectId: "zawa-studio",
    storageBucket: "zawa-studio.appspot.com",
    messagingSenderId: "302276600356",
    appId: "1:302276600356:web:c2c7b1007c200dfd82aeb1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.googleLogin = function () {
    signInWithPopup(auth, provider)
      .then((result) => {
        const user = result.user;

        const userData = {
          name: user.displayName,
          email: user.email,
          photo: user.photoURL
        };

        localStorage.setItem("user", JSON.stringify(userData));
        localStorage.setItem("loggedIn", "true");

        window.location.href = "index.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  };
</script>
</body>
</html>
