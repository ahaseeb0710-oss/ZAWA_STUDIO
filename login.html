<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16x16.png">
  <link rel="manifest" href="assets/img/site.webmanifest">

  <style>
 
    /* popup */
    .cart-popup {
      position: fixed;
      top: 30px;
      right: 30px;
      background: #111;
      color: #fff;
      padding: 18px 22px;
      border-radius: 14px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 9999;
      min-width: 260px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cart-popup.show {
      transform: translateX(0);
      opacity: 1;
    }

    .cart-popup i {
      font-size: 26px;
      color: #c59d5f;
    }

    .cart-popup h4 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .cart-popup p {
      margin: 2px 0 0;
      font-size: 13px;
      color: #ccc;
    }
    .google-btn {
  width: 100%;
  background: #fff;
  color: #333;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.3s ease;
}

.google-btn:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  transform: translateY(-2px);
}

.google-btn img {
  width: 20px;
}
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Login</h2>
    <button class="google-btn" onclick="googleLogin()">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
  Continue with Google
</button>
    
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required minlength="6">
    <button onclick="login()">Login</button>
    <p>Don't have an account? 
      <a href="signup.html" style="text-decoration: none; color: #ff4fd8;">Sign Up</a>
    </p>
  </div>

  <!-- Popup container (dynamic) -->
  <div id="popup-container"></div>

  <script>
    function showPopup(title, message, icon = "✓") {
      const popup = document.createElement("div");
      popup.className = "cart-popup show";
      popup.innerHTML = `
        <i>${icon}</i>
        <div>
          <h4>${title}</h4>
          <p>${message}</p>
        </div>
      `;
      document.body.appendChild(popup);

      // Auto hide after 3 seconds
      setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => popup.remove(), 400); // wait for transition
      }, 3000);
    }

 
  </script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
 import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYqOXhQK32naYdg0ZqX-T6b90yw8qDHpA",
    authDomain: "zawa-studio.firebaseapp.com",
    projectId: "zawa-studio",
    storageBucket: "zawa-studio.appspot.com",
    messagingSenderId: "302276600356",
    appId: "1:302276600356:web:c2c7b1007c200dfd82aeb1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  setPersistence(auth, browserLocalPersistence);
  const provider = new GoogleAuthProvider();

window.googleLogin = function () {
  signInWithPopup(auth, provider)
    .then(() => {

      const redirectPage = localStorage.getItem("redirectAfterLogin");

      if (redirectPage) {
        localStorage.removeItem("redirectAfterLogin");
        window.location.href = redirectPage;
      } else {
        window.location.href = "index.html";
      }

    })
    .catch((error) => {
      showPopup("Error", error.message, "❌");
    });
};
  window.login = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showPopup("Error", "Please fill all fields!", "⚠️");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      showPopup("Success", "Login Successful!", "✓");

      const redirectPage = localStorage.getItem("redirectAfterLogin");

      setTimeout(() => {
        if (redirectPage) {
          localStorage.removeItem("redirectAfterLogin");
          window.location.href = redirectPage;
        } else {
          window.location.href = "index.html";
        }
      }, 1200);
    })
    .catch((error) => {
      if (error.code === "auth/user-not-found") {
        showPopup("Error", "No account found. Please sign up or use Google.", "⚠️");
      } else if (error.code === "auth/wrong-password") {
        showPopup("Error", "Incorrect password.", "❌");
      } else {
        showPopup("Error", error.message, "❌");
      }
    });
};
</script>

</body>
</html>
